server:
  port: 8083

spring:
  application:
    name: orchestration-scheduler
  datasource:
    url: jdbc:postgresql://localhost:5432/joposcragent?stringtype=unspecified
    username: postgres
    password: postgres
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

scheduler:
  tick-interval-ms: 600000

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Uncomment for verbose service logs (REST + Kafka payloads):
# logging:
#   level:
#     ru.sadovskie.leo.app.joposcragent.schedulersvc: DEBUG
